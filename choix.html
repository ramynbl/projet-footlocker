<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix de ta sneakers - Clean Your Kicks - FootLocker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <main class="page-wrapper">

        <img src="assets/logo-footlocker.png" alt="Logo Footlocker blanc" class="logo-foot-locker">
        <img src="assets/clean-your-kicks.png" alt="Clean your kicks" class="clean-your-kicks">

        <p class="choice">Choisis ta sneakers</p>

        <img src="assets/airmax-hero.png" alt="Nike AirMax Portal" class="photo-sneaker">

        <div class="nom-paire">Nike AirMax Portal</div>
        <!--Nom de la paire en js plus tard-->

        <!--Carousel géré en js plus tard-->
        <div class="choix-container">
            <img src="assets/jordan2.png" alt="Air Jordan 1" class="sneaker-last">
            <img src="assets/new-balance-sale2.png" alt="New Balance 530" class="sneaker">
            <img src="assets/airmax2.png" alt="Nike Air Max Portal" class="sneaker-main">
            <img src="assets/adidas2.png" alt="Adidas Samba" class="sneaker">
            <img src="assets/puma2.png" alt="Puma Palermo" class="sneaker-last">
        </div>

        <div class="choisir-btn">
            <a href="recompense.html" class="cta-button">Choisir</a>
        </div>
    </main>
</body>

</html>
